<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to WT-DAQ Power Calculator</title>
    
    <meta http-equiv="refresh" content="0; url=./Analysis/calculator.html" />
    
    <style>
        body {
            background-color: #f5f1e8; /* Matches your --paper theme color */
            color: #1a1a1a;           /* Matches your --ink theme color */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .redirect-box {
            text-align: center;
            padding: 24px;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(26,26,26,0.1);
            border-radius: 50%;
            border-top-color: #b54a2c; /* Matches your --rust accent color */
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 16px auto;
        }
        p {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        a {
            color: #b54a2c;
            text-decoration: none;
            border-bottom: 1px dashed #b54a2c;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="redirect-box">
        <div class="spinner"></div>
        <p>Loading WT-DAQ Power Calculator...</p>
        <p style="font-size: 12px; color: #666; margin-top: 8px;">
            If you are not redirected automatically, <a href="./Analysis/calculator.html">click here</a>.
        </p>
    </div>

</body>
</html>
